name: CD — Release & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build dcvpg/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dcvpg/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dcvpg/dist/*
          generate_release_notes: true

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dcvpg/infra/Dockerfile
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dcvpg:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/dcvpg:latest

      - name: Push image (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker push ghcr.io/${{ github.repository_owner }}/dcvpg:${{ steps.meta.outputs.VERSION }}
            docker push ghcr.io/${{ github.repository_owner }}/dcvpg:latest
