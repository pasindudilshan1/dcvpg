name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dcvpg_user
          POSTGRES_PASSWORD: dcvpg_password
          POSTGRES_DB: dcvpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[ai,mcp,airflow]"
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Lint
        run: |
          pip install ruff
          ruff check dcvpg/

      - name: Unit tests
        run: |
          pytest dcvpg/tests/unit/ -v --cov=dcvpg --cov-report=xml

      - name: Integration tests
        env:
          DCVPG_DB_HOST: localhost
          DCVPG_DB_PORT: 5432
          DCVPG_DB_NAME: dcvpg
          DCVPG_DB_USER: dcvpg_user
          DCVPG_DB_PASSWORD: dcvpg_password
          DCVPG_API_KEY: ci-test-key
        run: |
          pytest dcvpg/tests/integration/ -v -m integration

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          pip install build
          python -m build dcvpg/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dcvpg/dist/
